<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | SponFin Backoffice</title>
  <link rel="shortcut icon" href="/assets/logo.png" type="image/png">
  <link rel="stylesheet" href="/css/admin.css">
</head>

<body class="admin-login-wrapper">

  <div class="login-card">
    <img src="/assets/logo.png" alt="SponFin Logo" class="logo">
    <h2>SponFin Backoffice</h2>
    <p>Sign in to manage dynamic content, leads, and website configurations.</p>

    <div id="login-msg" class="login-message"></div>

    <form id="admin-login-form">
      <div class="admin-form-group" style="text-align: left;">
        <label for="login-email">Email Address</label>
        <input type="email" id="login-email" placeholder="admin@sponfin.com" required>
      </div>
      <div class="admin-form-group" style="text-align: left;">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-admin btn-admin-primary"
        style="width: 100%; justify-content: center; padding: 12px;">Login</button>
    </form>

    <div style="margin-top: 24px;">
      <a href="/" style="font-size:12px; color:var(--text-muted); text-decoration: underline;">&larr; Back to public
        website</a>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/admin.js"></script>

</body>

</html>
